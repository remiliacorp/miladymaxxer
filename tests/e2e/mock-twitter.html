<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>X</title>
  <style>
    /* Approximate Twitter/X dark-mode styling so the page looks realistic */
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: rgb(231, 233, 234);
    }

    /* Timeline container */
    .timeline {
      max-width: 600px;
      margin: 0 auto;
      border-left: 1px solid rgb(47, 51, 54);
      border-right: 1px solid rgb(47, 51, 54);
    }

    /* Individual tweet cell */
    [data-testid="cellInnerDiv"] {
      border-bottom: 1px solid rgb(47, 51, 54);
      padding: 12px 16px;
    }

    /* Tweet article layout */
    article[data-testid="tweet"] {
      display: flex;
      gap: 12px;
    }

    /* Avatar column */
    [data-testid="Tweet-User-Avatar"] {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
    }

    [data-testid="Tweet-User-Avatar"] a {
      display: block;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      overflow: hidden;
    }

    [data-testid="Tweet-User-Avatar"] img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Tweet body */
    .tweet-body {
      flex: 1;
      min-width: 0;
    }

    /* User-Name row */
    [data-testid="User-Name"] {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 4px;
    }

    [data-testid="User-Name"] span {
      font-size: 15px;
    }

    [data-testid="User-Name"] .display-name {
      font-weight: 700;
    }

    [data-testid="User-Name"] .handle {
      color: rgb(113, 118, 123);
    }

    /* Tweet text */
    [data-testid="tweetText"] {
      font-size: 15px;
      line-height: 1.4;
      margin-bottom: 12px;
    }

    /* Action bar */
    .actions {
      display: flex;
      gap: 48px;
      color: rgb(113, 118, 123);
    }

    .actions button {
      background: none;
      border: none;
      color: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      padding: 0;
    }

    .actions button svg {
      width: 18px;
      height: 18px;
    }

    /* UserCell (search results / who-to-follow) */
    [data-testid="UserCell"] {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid rgb(47, 51, 54);
    }

    [data-testid="UserCell"] img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }

    /* Primary column wrapper */
    [data-testid="primaryColumn"] {
      min-height: 100vh;
    }
  </style>
  <script>
    // Match Twitter's dark background color that the content script expects
    document.documentElement.style.backgroundColor = "rgb(0, 0, 0)";
  </script>
</head>
<body>
