name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build extension
        run: pnpm run build

      - name: Package unpacked extension
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          PACKAGE_DIR="release/milady-shrinkifier-${TAG_NAME}"
          mkdir -p "$PACKAGE_DIR"
          cp -R dist/. "$PACKAGE_DIR/"
          cd release
          zip -r "milady-shrinkifier-${TAG_NAME}-unpacked.zip" "milady-shrinkifier-${TAG_NAME}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: release/milady-shrinkifier-${{ github.ref_name }}-unpacked.zip
